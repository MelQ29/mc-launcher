name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*', 'launcher-v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: EclipseFantasy-windows
          - os: ubuntu-latest
            target: linux
            artifact: EclipseFantasy-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Package (Windows)
        if: matrix.target == 'win'
        run: npm run dist:win

      - name: Package (Linux)
        if: matrix.target == 'linux'
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.zip
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/launcher-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.AppImage
            dist-artifacts/**/*.zip
            dist-artifacts/**/*.yml
            dist-artifacts/**/*.blockmap
          generate_release_notes: true
